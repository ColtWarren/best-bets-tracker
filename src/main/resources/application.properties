# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=${SERVER_PORT:8081}

# ===========================================
# DATABASE CONFIGURATION
# ===========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:best_bets_tracker}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
# JPA / HIBERNATE
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===========================================
# MAIN APP INTEGRATION
# ===========================================
main-app.base-url=${MAIN_APP_BASE_URL:http://localhost:8080}
internal.api.key=${INTERNAL_API_KEY:}

# ===========================================
# API KEYS (active)
# ===========================================
claude.api.key=${CLAUDE_API_KEY:}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-20250514

odds.api.key=${ODDS_API_KEY:}
odds.api.url=https://api.the-odds-api.com/v4

# ESPN API - no key required (public)
espn.api.url=https://site.api.espn.com/apis/site/v2/sports

# ===========================================
# CORS CONFIGURATION
# ===========================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081}

# ===========================================
# GOOGLE OAUTH2
# ===========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${app.frontend-url}/login/oauth2/code/google

# Owner email — only this Google account can access the app
app.allowed-email=${ALLOWED_EMAIL:}

# SameSite=Lax — everything goes through the Vite proxy on the same origin
server.servlet.session.cookie.same-site=lax

# Frontend URL for OAuth2 redirects
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ===========================================
# LOGGING
# ===========================================
logging.level.com.coltwarren.best_bets_tracker=DEBUG
